<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自动剪辑工具</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <div class="editor-pane">
          <header>
            <p class="eyebrow">AutoCut Local</p>
            <h1>小说分段自动成片</h1>
          </header>

          <label class="field">
            <span>小说文本</span>
            <textarea id="textInput" placeholder="每个回车段落会切入下一张图片"></textarea>
          </label>

          <label class="file-drop" for="imageInput">
            <input id="imageInput" type="file" accept=".jpg,.jpeg,.png,.webp,image/*" webkitdirectory multiple />
            <span>选择图片文件夹</span>
            <strong id="imageSummary">尚未选择图片</strong>
          </label>
        </div>

        <aside class="control-pane">
          <h2>生成设置</h2>

          <label class="field compact">
            <span>每秒字数</span>
            <input id="charsPerSecond" type="number" min="1" max="20" step="0.5" value="4" />
          </label>

          <div class="number-row">
            <label class="field compact">
              <span>最短秒数</span>
              <input id="minSeconds" type="number" min="0.5" max="30" step="0.5" value="2" />
            </label>
            <label class="field compact">
              <span>最长秒数</span>
              <input id="maxSeconds" type="number" min="1" max="60" step="0.5" value="8" />
            </label>
          </div>

          <label class="toggle">
            <input id="imageCropFill" type="checkbox" checked />
            <span>裁切铺满画面</span>
          </label>
          <p class="field-hint">关闭后完整显示图片，比例不符时上下或左右留黑边</p>

          <label class="field compact">
            <span>图片动效</span>
            <select id="imageMotion">
              <option value="both" selected>推镜 + 浮动</option>
              <option value="zoom">缓慢放大</option>
              <option value="float">上下浮动</option>
              <option value="alternate">交替（奇偶段不同）</option>
              <option value="random">随机（每段不同）</option>
              <option value="none">静止</option>
            </select>
          </label>

          <label class="toggle">
            <input id="subtitleEnabled" type="checkbox" checked />
            <span>显示字幕</span>
          </label>

          <div class="stats">
            <div>
              <span>段落</span>
              <strong id="segmentCount">0</strong>
            </div>
            <div>
              <span>图片</span>
              <strong id="imageCount">0</strong>
            </div>
            <div>
              <span>预计时长</span>
              <strong id="durationTotal">0s</strong>
            </div>
          </div>

          <p id="ttsStatus" class="tts-status">旁白引擎：加载中…</p>

          <button id="renderButton" type="button">生成视频</button>
          <p id="status" class="status">等待输入</p>
          <a id="downloadLink" class="download" hidden>下载视频</a>
        </aside>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
